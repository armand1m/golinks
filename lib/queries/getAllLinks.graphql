query getAllLinks($first: Int = 50) {
  links(orderBy: ALIAS_ASC, first: $first) {
    nodes {
      id
      url
      alias
      isPrivate
      createdByEmail
      linkAllowedEmails {
        nodes {
          id
          email
        }
      }
      linkUsageMetrics {
        totalCount
      }
      recentUsageMetrics {
        nodes {
          accessedAt
        }
      }
    }
  }
}
