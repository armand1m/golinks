query searchLinks($search: String!) {
  searchLinks(search: $search) {
    nodes {
      id
      url
      alias
      isPrivate
      createdByEmail
      linkAllowedEmails {
        nodes {
          id
          email
        }
      }
      linkUsageMetrics {
        totalCount
      }
      recentUsageMetrics {
        nodes {
          accessedAt
        }
      }
    }
  }
}
